services:
  backend:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_started

  worker:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama-gpu
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    gpus: all
    environment:
      OLLAMA_KEEP_ALIVE: 24h

volumes:
  ollama_data:
