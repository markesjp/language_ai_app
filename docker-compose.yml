services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api/v1
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://language_user:language_pass@pgbouncer:6432/language_ai
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost", "http://localhost:3000"]'
    depends_on:
      - pgbouncer
      - redis

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.audit_worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://language_user:language_pass@pgbouncer:6432/language_ai
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: language_ai
      POSTGRES_USER: language_user
      POSTGRES_PASSWORD: language_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"

  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p1
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: language_user
      DB_PASSWORD: language_pass
      DB_NAME: language_ai
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
    ports:
      - "6432:6432"
    depends_on:
      - postgres

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v3.0.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
